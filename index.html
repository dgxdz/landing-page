  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #f05a28;
      --orange-light: #f5906a;
      --black: #0d0d0d;
      --dark: #141414;
      --mid: #1e1e1e;
      --text: #e8e2da;
      --muted: #6b6560;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 100;
    }

    /* ── diagonal accent line ── */
    body::after {
      content: '';
      position: fixed;
      top: -10%; left: 62%;
      width: 1px; height: 120%;
      background: linear-gradient(to bottom, transparent, var(--orange) 40%, var(--orange) 60%, transparent);
      opacity: 0.12;
      transform: rotate(8deg);
      pointer-events: none;
    }

    .page {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 48px 64px;
      position: relative;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeUp 0.8s ease both;
    }

    .logo-wrap img {
      height: 38px;
      width: auto;
      filter: brightness(0) invert(1);
    }

    .header-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--mid);
      padding: 6px 14px;
      border-radius: 2px;
    }

    /* ── main ── */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      padding: 40px 0;
      max-width: 820px;
    }

    .eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 28px;
      animation: fadeUp 0.8s 0.15s ease both;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow::before {
      content: '';
      display: inline-block;
      width: 32px; height: 1px;
      background: var(--orange);
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(64px, 10vw, 118px);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    h1 span {
      color: var(--orange);
    }

    .sub {
      margin-top: 36px;
      font-size: 15px;
      font-weight: 300;
      line-height: 1.7;
      color: #a09890;
      max-width: 420px;
      animation: fadeUp 0.8s 0.38s ease both;
    }

    /* ── icon mark ── */
    .icon-mark {
      position: fixed;
      right: -60px; top: 50%;
      transform: translateY(-50%);
      width: 380px;
      opacity: 0.06;
      pointer-events: none;
      animation: fadeIn 1.4s 0.5s ease both;
    }

    /* ── footer ── */
    footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-email {
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-email:hover { color: var(--orange); }

    .social-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .social-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid #252525;
      padding: 7px 14px;
      border-radius: 2px;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .social-link:hover {
      color: var(--text);
      border-color: var(--orange);
    }

    .social-link svg {
      width: 13px; height: 13px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── orange bottom bar ── */
    .bar {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(to right, var(--orange), transparent 70%);
    }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 0.06; }
    }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .page { padding: 32px 28px; }
      .icon-mark { width: 260px; right: -40px; opacity: 0.05; }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

  <div class="page">
